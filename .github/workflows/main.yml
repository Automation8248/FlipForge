name: USA FlioForge

on:
  schedule:
    # 23:00 UTC = 6:00 PM EST (USA Evening Prime Time)
    # Yeh automation 24 ghante mein sirf 1 baar chalega
    - cron: '0 23 * * *' 
  workflow_dispatch: # Isse aap manually bhi test kar sakte ho kabhi bhi

jobs:
  post_video:
    runs-on: ubuntu-latest
    
    # ⚠️ YEH SABSE ZAROORI HAI: Taaki GitHub bot history.txt ko wapas repo mein save kar sake
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Autopost Script
        env:
          # Aapka Pabbly/Make webhook yahan aayega
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python autopost.py

      - name: Commit and Push updated history.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add history.txt
          git commit -m "Automated update: Added posted video to history.txt" || echo "No changes to commit"
          git push
